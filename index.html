<!DOCTYPE html>
<html lang="fil">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Araling Panlipunan 10</title>
  <style>
    :root{
      --ink:#10243f;
      --navy:#173b66;
      --blue:#2c6aa6;
      --sky:#89c7e8;
      --gold:#f1c75b;
      --cream:#f8f5ec;
      --paper:rgba(255,255,255,.92);
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      min-height:100vh;
      overflow:hidden;
      display:grid;
      place-items:center;
      background:
        radial-gradient(circle at 12% 12%, rgba(137,199,232,.50), transparent 24%),
        radial-gradient(circle at 88% 86%, rgba(241,199,91,.35), transparent 26%),
        linear-gradient(135deg,#f8f5ec 0%,#edf5fa 52%,#eaf1e3 100%);
      font-family:Georgia, "Times New Roman", serif;
      color:var(--ink);
    }
    .page{
      position:relative;
      width:min(1120px,92vw);
      min-height:min(640px,84vh);
      padding:clamp(32px,6vw,86px);
      display:grid;
      place-items:center;
      border:1px solid rgba(16,36,63,.13);
      border-radius:30px;
      background:var(--paper);
      box-shadow:0 26px 70px rgba(16,36,63,.16);
      isolation:isolate;
    }
    .page::before,.page::after{
      content:"";
      position:absolute;
      border-radius:50%;
      z-index:-1;
      pointer-events:none;
    }
    .page::before{
      width:460px;height:460px;left:-190px;top:-220px;
      border:2px solid rgba(44,106,166,.19);
      box-shadow:0 0 0 34px rgba(44,106,166,.055),0 0 0 70px rgba(44,106,166,.035);
    }
    .page::after{
      width:360px;height:360px;right:-155px;bottom:-175px;
      border:2px solid rgba(241,199,91,.30);
      box-shadow:0 0 0 28px rgba(241,199,91,.065),0 0 0 60px rgba(241,199,91,.035);
    }
    .line{
      position:absolute;border-radius:999px;
      background:linear-gradient(90deg,transparent,rgba(44,106,166,.24),transparent);
      opacity:.75;pointer-events:none;
    }
    .line.one{width:76%;height:1px;top:21%;transform:rotate(-12deg)}
    .line.two{width:66%;height:1px;bottom:18%;transform:rotate(18deg)}
    .line.three{width:42%;height:1px;right:-6%;top:47%;transform:rotate(-32deg)}
    .content{
      width:min(760px,100%);
      text-align:center;
      display:grid;
      gap:clamp(34px,6vh,64px);
      animation:enter .75s ease both;
    }
    .subject{
      margin:0;color:var(--navy);
      font-size:clamp(1.25rem,2.4vw,2.15rem);
      line-height:1.15;font-weight:700;
      letter-spacing:.11em;text-transform:uppercase;
      text-shadow:0 2px 0 rgba(255,255,255,.9);
    }
    .test-link{
      position:relative;
      display:inline-flex;align-items:center;justify-content:center;justify-self:center;
      width:min(650px,100%);min-height:150px;padding:28px 34px;
      color:white;text-decoration:none;
      font-family:Arial, Helvetica, sans-serif;
      font-size:clamp(1.45rem,3vw,2.85rem);
      font-weight:800;line-height:1.1;letter-spacing:.015em;text-align:center;
      border-radius:22px;
      background:linear-gradient(135deg,rgba(255,255,255,.14),rgba(255,255,255,0)),
                 linear-gradient(135deg,var(--navy),var(--blue));
      box-shadow:0 16px 0 #123054,0 22px 38px rgba(23,59,102,.27);
      transform:translateY(0);
      transition:transform .22s ease, box-shadow .22s ease, filter .22s ease;
      overflow:hidden;
    }
    .test-link::before{
      content:"";position:absolute;inset:-90% -50%;
      background:linear-gradient(100deg,transparent 42%,rgba(255,255,255,.28) 50%,transparent 58%);
      transform:translateX(-70%) rotate(14deg);
      transition:transform .65s ease;
    }
    .test-link:hover,.test-link:focus-visible{
      transform:translateY(-7px);filter:saturate(1.06);
      box-shadow:0 22px 0 #123054,0 30px 46px rgba(23,59,102,.30);
      outline:none;
    }
    .test-link:hover::before,.test-link:focus-visible::before{
      transform:translateX(75%) rotate(14deg);
    }
    .test-link:active{
      transform:translateY(7px);
      box-shadow:0 9px 0 #123054,0 14px 26px rgba(23,59,102,.21);
    }
    @keyframes enter{
      from{opacity:0;transform:translateY(18px)}
      to{opacity:1;transform:translateY(0)}
    }
    @media (max-width:560px){
      body{overflow:auto;padding:18px 0}
      .page{min-height:calc(100vh - 36px);border-radius:24px;padding:30px 22px}
      .test-link{min-height:136px;border-radius:18px}
    }
  </style>
</head>
<body>
  <main class="page">
    <span class="line one"></span>
    <span class="line two"></span>
    <span class="line three"></span>
    <section class="content" aria-label="Araling Panlipunan 10">
      <h1 class="subject">Araling Panlipunan 10</h1>
      <a class="test-link" href="AP10 Term 1 Summative Test 1.html">AP10 Term 1 Summative Test 1 </a>
    </section>
  </main>
</body>
</html>
